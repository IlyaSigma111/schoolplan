<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>школьный участок — генератор плана</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f1f5f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* верхняя панель — минимум декора */
        .top-bar {
            background: #ffffff;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 16px;
            border-bottom: 1px solid #e2e8e0;
        }

        .title-section h1 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.3px;
            color: #1a2e1f;
        }

        .title-section p {
            font-size: 0.8rem;
            color: #5a6e52;
            margin-top: 4px;
        }

        .stats-badge {
            background: #f0f3ee;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #2c4a2a;
            font-weight: 450;
        }

        button {
            background: #2c5e2f;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #1f4621;
        }

        /* инфо-строка */
        .info-row {
            background: #fafcf8;
            padding: 8px 24px;
            display: flex;
            gap: 28px;
            font-size: 0.75rem;
            color: #3e5a37;
            border-bottom: 1px solid #e2e8e0;
            font-weight: 450;
        }

        /* контейнер для канваса */
        .canvas-container {
            flex: 1;
            position: relative;
            background: #e3ecd9;
            overflow: hidden;
            cursor: grab;
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

        /* тост с информацией */
        .toast-info {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: #1e2f24;
            color: #f0f7e6;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            max-width: 320px;
            backdrop-filter: blur(8px);
            background: rgba(25, 40, 20, 0.92);
            border-left: 3px solid #9bc48b;
            pointer-events: none;
            z-index: 200;
            transition: opacity 0.2s ease;
            font-weight: 430;
            line-height: 1.4;
        }

        .zoom-hint {
            position: fixed;
            bottom: 16px;
            right: 20px;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #eef5e6;
            pointer-events: none;
            z-index: 200;
            font-family: monospace;
        }

        @media (max-width: 700px) {
            .top-bar { padding: 12px 16px; }
            .title-section h1 { font-size: 1.2rem; }
            button { padding: 6px 14px; font-size: 0.75rem; }
            .info-row { padding: 6px 16px; gap: 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="title-section">
        <h1>школьный участок · генератор</h1>
        <p>110×65 м · вход 30–50 м (юг) · школа север (центр)</p>
    </div>
    <div style="display: flex; gap: 16px; align-items: center;">
        <div class="stats-badge" id="statsDisplay">— клумб, — цветов</div>
        <button id="regenerateBtn">
            <span>⟳</span> новый план
        </button>
    </div>
</div>
<div class="info-row">
    <span>📍 клик по клумбе → формулы + расчёт цветов</span>
    <span>🌸 клик по цветку → совет садовода</span>
    <span>🖱️ мышь: drag = перемещение · колёсико = зум</span>
</div>
<div class="canvas-container" id="canvasContainer">
    <canvas id="mainCanvas"></canvas>
</div>
<div id="toastMessage" class="toast-info" style="opacity: 0;"></div>
<div class="zoom-hint">⚡ зум: колесо мыши</div>

<script>
    // --------------------------------------------------------------
    // РАЗМЕРЫ УЧАСТКА (метры)
    // --------------------------------------------------------------
    const FIELD_W = 110;          // метров (x)
    const FIELD_H = 65;           // метров (y)
    const GATE_START = 30;
    const GATE_END = 50;
    const SCHOOL_CX = 55;         // центр школы по X
    const SCHOOL_Y = 0;
    const SCHOOL_W = 24;          // ширина здания
    const SCHOOL_H = 12;

    // --------------------------------------------------------------
    // ГЛОБАЛЬНЫЕ ДАННЫЕ
    // --------------------------------------------------------------
    let beds = [];           // клумбы: {type, x, y, radius / width, height, mainFlower}
    let paths = [];          // дорожки: {width, points: [{x,y}]}
    let flowers = [];        // {x, y, bedId, flowerType}
    
    // камера (зум + панорамирование)
    let camera = { x: 0, y: 0, zoom: 1.0, width: 800, height: 600 };
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let canvas, ctx, container;

    // база фактов (реальные садовые советы)
    const FACTS = [
        "🌱 Бархатцы выделяют вещества, которые отпугивают нематод и тлю.",
        "💧 Полив под корень утром снижает риск грибковых болезней.",
        "🌻 Подсолнухи помогают очищать почву от свинца и кадмия.",
        "🌸 Петунии нужно прищипывать после 4-го листа для кустистости.",
        "🌹 Розы любят золу: стакан под куст весной.",
        "🍀 Клевер ползучий обогащает газон азотом – удобрение не нужно.",
        "📐 Площадь круга S = πR², длина окружности C = 2πR (9 класс).",
        "📏 Шаг посадки цветов 25–30 см – оптимальная плотность.",
        "🌷 Луковицы тюльпанов сажают на глубину 3 луковиц.",
        "✂️ Удаление увядших соцветий продлевает цветение на 2–3 недели.",
        "🐝 Лаванда привлекает пчёл и улучшает опыление всего огорода.",
        "🌿 Мульча из коры сохраняет влагу и не даёт расти сорнякам."
    ];

    // случайное число
    function rand(min, max) {
        return min + Math.random() * (max - min);
    }

    function randomFlower() {
        const arr = ['🌼 Ромашка', '🌷 Тюльпан', '🌹 Роза', '🌸 Петуния', '🌺 Мак', '🌻 Подсолнух', '💜 Лаванда'];
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // ---------- ГЕОМЕТРИЧЕСКИЕ ПРОВЕРКИ (метры) ----------
    function distToSegment(px, py, ax, ay, bx, by) {
        const abx = bx - ax;
        const aby = by - ay;
        const t = ((px - ax) * abx + (py - ay) * aby) / (abx * abx + aby * aby || 1);
        const t2 = Math.max(0, Math.min(1, t));
        const nx = ax + abx * t2;
        const ny = ay + aby * t2;
        return Math.hypot(px - nx, py - ny);
    }

    function circleRectCollision(cx, cy, r, rx, ry, rw, rh, margin = 0) {
        const closestX = Math.max(rx - margin, Math.min(cx, rx + rw + margin));
        const closestY = Math.max(ry - margin, Math.min(cy, ry + rh + margin));
        return Math.hypot(cx - closestX, cy - closestY) < r + margin;
    }

    function rectRectCollision(x1, y1, w1, h1, x2, y2, w2, h2, margin = 0) {
        return (x1 - margin < x2 + w2 + margin && x1 + w1 + margin > x2 - margin &&
                y1 - margin < y2 + h2 + margin && y1 + h1 + margin > y2 - margin);
    }

    // пересечение клумбы с дорожками
    function bedCollidesWithPaths(bed, pathsList, margin = 1.0) {
        for (let p of pathsList) {
            for (let i = 0; i < p.points.length - 1; i++) {
                const a = p.points[i], b = p.points[i+1];
                if (bed.type === 'circle') {
                    const d = distToSegment(bed.x, bed.y, a.x, a.y, b.x, b.y);
                    if (d < bed.radius + p.width/2 + margin) return true;
                } else {
                    const halfW = bed.width/2, halfH = bed.height/2;
                    const corners = [
                        {x: bed.x - halfW, y: bed.y - halfH},
                        {x: bed.x + halfW, y: bed.y - halfH},
                        {x: bed.x - halfW, y: bed.y + halfH},
                        {x: bed.x + halfW, y: bed.y + halfH},
                        {x: bed.x, y: bed.y}
                    ];
                    for (let c of corners) {
                        if (distToSegment(c.x, c.y, a.x, a.y, b.x, b.y) < p.width/2 + margin) return true;
                    }
                }
            }
        }
        return false;
    }

    function bedCollidesWithOtherBeds(newBed, existingBeds, margin = 1.2) {
        for (let b of existingBeds) {
            if (b.type === 'circle' && newBed.type === 'circle') {
                if (Math.hypot(b.x - newBed.x, b.y - newBed.y) < b.radius + newBed.radius + margin) return true;
            } else if (b.type === 'square' && newBed.type === 'square') {
                if (rectRectCollision(b.x - b.width/2, b.y - b.height/2, b.width, b.height,
                                      newBed.x - newBed.width/2, newBed.y - newBed.height/2, newBed.width, newBed.height, margin)) return true;
            } else if (b.type === 'circle' && newBed.type === 'square') {
                if (circleRectCollision(b.x, b.y, b.radius, newBed.x - newBed.width/2, newBed.y - newBed.height/2, newBed.width, newBed.height, margin)) return true;
            } else if (b.type === 'square' && newBed.type === 'circle') {
                if (circleRectCollision(newBed.x, newBed.y, newBed.radius, b.x - b.width/2, b.y - b.height/2, b.width, b.height, margin)) return true;
            }
        }
        return false;
    }

    function bedCollidesWithSchool(bed, margin = 1.2) {
        const sx = SCHOOL_CX - SCHOOL_W/2, sy = SCHOOL_Y;
        if (bed.type === 'circle')
            return circleRectCollision(bed.x, bed.y, bed.radius, sx, sy, SCHOOL_W, SCHOOL_H, margin);
        else
            return rectRectCollision(bed.x - bed.width/2, bed.y - bed.height/2, bed.width, bed.height, sx, sy, SCHOOL_W, SCHOOL_H, margin);
    }

    function bedCollidesWithGate(bed, margin = 1.2) {
        const gateRect = { x: GATE_START, y: FIELD_H - 1.5, w: GATE_END - GATE_START, h: 2.5 };
        if (bed.type === 'circle')
            return circleRectCollision(bed.x, bed.y, bed.radius, gateRect.x, gateRect.y, gateRect.w, gateRect.h, margin);
        else
            return rectRectCollision(bed.x - bed.width/2, bed.y - bed.height/2, bed.width, bed.height, gateRect.x, gateRect.y, gateRect.w, gateRect.h, margin);
    }

    // ---------- ГЕНЕРАЦИЯ ДОРОЖЕК ----------
    function generatePaths() {
        const p = [];
        // центральная аллея (левая часть от ворот)
        p.push({ width: rand(1.8, 2.3), points: [
            { x: GATE_START, y: FIELD_H },
            { x: rand(38, 48), y: rand(35, 48) },
            { x: SCHOOL_CX - 4, y: SCHOOL_Y + 3 }
        ]});
        // правая часть
        p.push({ width: rand(1.8, 2.3), points: [
            { x: GATE_END, y: FIELD_H },
            { x: rand(62, 74), y: rand(38, 50) },
            { x: SCHOOL_CX + 4, y: SCHOOL_Y + 3 }
        ]});
        // дополнительная поперечная дорожка
        p.push({ width: rand(1.5, 2.0), points: [
            { x: rand(18, 28), y: rand(28, 38) },
            { x: rand(82, 95), y: rand(32, 44) }
        ]});
        return p;
    }

    // ГЕНЕРАЦИЯ КЛУМБ
    function generateBeds(pathsList, maxAttempts = 140) {
        const newBeds = [];
        const target = Math.floor(rand(5, 9));
        for (let i = 0; i < target; i++) {
            let placed = false;
            for (let attempts = 0; attempts < maxAttempts && !placed; attempts++) {
                const isCircle = Math.random() < 0.7;
                if (isCircle) {
                    const radius = rand(2.5, 8.2);
                    const x = rand(radius + 1.5, FIELD_W - radius - 1.5);
                    const y = rand(radius + 1.5, FIELD_H - radius - 1.5);
                    const candidate = { type: 'circle', x, y, radius, mainFlower: randomFlower() };
                    if (!bedCollidesWithOtherBeds(candidate, newBeds, 1.2) &&
                        !bedCollidesWithPaths(candidate, pathsList, 1.0) &&
                        !bedCollidesWithSchool(candidate, 1.3) &&
                        !bedCollidesWithGate(candidate, 1.2)) {
                        newBeds.push(candidate);
                        placed = true;
                    }
                } else {
                    const width = rand(2.2, 6.8);
                    const height = rand(2.2, 6.8);
                    const x = rand(width/2 + 1.5, FIELD_W - width/2 - 1.5);
                    const y = rand(height/2 + 1.5, FIELD_H - height/2 - 1.5);
                    const candidate = { type: 'square', x, y, width, height, mainFlower: randomFlower() };
                    if (!bedCollidesWithOtherBeds(candidate, newBeds, 1.2) &&
                        !bedCollidesWithPaths(candidate, pathsList, 1.0) &&
                        !bedCollidesWithSchool(candidate, 1.3) &&
                        !bedCollidesWithGate(candidate, 1.2)) {
                        newBeds.push(candidate);
                        placed = true;
                    }
                }
            }
        }
        return newBeds;
    }

    // статистика для попапа
    function getBedStats(bed) {
        let area = 0, perimeter = 0;
        if (bed.type === 'circle') {
            area = Math.PI * bed.radius * bed.radius;
            perimeter = 2 * Math.PI * bed.radius;
        } else {
            area = bed.width * bed.height;
            perimeter = 2 * (bed.width + bed.height);
        }
        const density = rand(4.2, 5.8);
        let plants = Math.floor(area * density);
        plants = Math.max(6, plants);
        return { area: area.toFixed(1), perimeter: perimeter.toFixed(1), plants, density: density.toFixed(1) };
    }

    // генерация цветов на клумбе (шаг ~0.3 м)
    function generateFlowersOnBed(bed, bedId) {
        const list = [];
        if (bed.type === 'circle') {
            const circumference = 2 * Math.PI * bed.radius;
            const step = rand(0.28, 0.38);
            let numCirc = Math.floor(circumference / step);
            numCirc = Math.min(45, Math.max(6, numCirc));
            for (let i = 0; i < numCirc; i++) {
                const ang = (i / numCirc) * Math.PI * 2;
                const fx = bed.x + Math.cos(ang) * bed.radius;
                const fy = bed.y + Math.sin(ang) * bed.radius;
                list.push({ x: fx, y: fy, bedId, flowerType: bed.mainFlower });
            }
            const innerCnt = Math.min(32, Math.floor(Math.PI * bed.radius * bed.radius * 4.5 * 0.4));
            for (let i = 0; i < innerCnt; i++) {
                const r = Math.sqrt(Math.random()) * bed.radius * 0.7;
                const ang = Math.random() * Math.PI * 2;
                list.push({ x: bed.x + Math.cos(ang) * r, y: bed.y + Math.sin(ang) * r, bedId, flowerType: bed.mainFlower });
            }
        } else {
            const step = rand(0.28, 0.36);
            const startX = bed.x - bed.width/2;
            const startY = bed.y - bed.height/2;
            for (let ix = 0; ix <= bed.width / step; ix++) {
                for (let iy = 0; iy <= bed.height / step; iy++) {
                    if (Math.random() > 0.7) continue;
                    const fx = startX + ix * step + (Math.random() - 0.5) * 0.1;
                    const fy = startY + iy * step + (Math.random() - 0.5) * 0.1;
                    if (fx > startX - 0.2 && fx < startX + bed.width + 0.2 && fy > startY - 0.2 && fy < startY + bed.height + 0.2)
                        list.push({ x: fx, y: fy, bedId, flowerType: bed.mainFlower });
                }
            }
        }
        return list;
    }

    // ---------- ОТРИСОВКА (КАСТОМНЫЙ ЗУМ/ПАН) ----------
    function worldToScreen(x, y) {
        return { x: (x - camera.x) * camera.zoom, y: (y - camera.y) * camera.zoom };
    }
    function screenToWorld(px, py) {
        return { x: px / camera.zoom + camera.x, y: py / camera.zoom + camera.y };
    }

    function draw() {
        if (!ctx) return;
        const w = camera.width, h = camera.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#e0ebd3';
        ctx.fillRect(0, 0, w, h);
        
        // сетка 10 метров
        ctx.beginPath();
        ctx.strokeStyle = '#b6caa2';
        ctx.lineWidth = 1;
        for (let i = 0; i <= FIELD_W; i += 10) {
            let p1 = worldToScreen(i, 0), p2 = worldToScreen(i, FIELD_H);
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            let p3 = worldToScreen(0, i), p4 = worldToScreen(FIELD_W, i);
            ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.stroke();
        }
        
        // школа
        ctx.fillStyle = '#bc8f6b';
        const sLeft = worldToScreen(SCHOOL_CX - SCHOOL_W/2, SCHOOL_Y);
        const sRight = worldToScreen(SCHOOL_CX + SCHOOL_W/2, SCHOOL_Y + SCHOOL_H);
        ctx.fillRect(sLeft.x, sLeft.y, sRight.x - sLeft.x, sRight.y - sLeft.y);
        ctx.fillStyle = '#6e4f34';
        const doorL = worldToScreen(SCHOOL_CX - 3, SCHOOL_Y + 7);
        const doorR = worldToScreen(SCHOOL_CX + 3, SCHOOL_Y + 12);
        ctx.fillRect(doorL.x, doorL.y, doorR.x - doorL.x, doorR.y - doorL.y);
        
        // ворота
        ctx.fillStyle = '#b88855';
        const gateL = worldToScreen(GATE_START, FIELD_H - 1);
        const gateR = worldToScreen(GATE_END, FIELD_H);
        ctx.fillRect(gateL.x, gateL.y - 6, gateR.x - gateL.x, 8);
        
        // дорожки
        for (let p of paths) {
            ctx.beginPath();
            ctx.lineWidth = p.width * camera.zoom;
            ctx.strokeStyle = '#cfa668';
            ctx.lineCap = 'round';
            for (let i = 0; i < p.points.length; i++) {
                const pt = worldToScreen(p.points[i].x, p.points[i].y);
                if (i === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();
        }
        
        // клумбы
        for (let bed of beds) {
            if (bed.type === 'circle') {
                const c = worldToScreen(bed.x, bed.y);
                const rPx = bed.radius * camera.zoom;
                ctx.beginPath();
                ctx.arc(c.x, c.y, rPx, 0, 2 * Math.PI);
                ctx.fillStyle = '#e7dbbd';
                ctx.fill();
                ctx.strokeStyle = '#8b694a';
                ctx.lineWidth = 1.8;
                ctx.stroke();
                ctx.fillStyle = '#2c4724';
                ctx.font = `500 ${Math.max(11, 12 * camera.zoom)}px Inter`;
                ctx.fillText(`R=${bed.radius.toFixed(1)}м`, c.x - 18, c.y - 10);
            } else {
                const w2 = bed.width/2, h2 = bed.height/2;
                const tl = worldToScreen(bed.x - w2, bed.y - h2);
                const br = worldToScreen(bed.x + w2, bed.y + h2);
                ctx.fillStyle = '#e7dbbd';
                ctx.fillRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
                ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);
                ctx.fillStyle = '#2c4724';
                ctx.font = `${Math.max(10, 11 * camera.zoom)}px Inter`;
                ctx.fillText(`${bed.width.toFixed(1)}×${bed.height.toFixed(1)}м`, tl.x + 4, tl.y - 4);
            }
        }
        
        // цветы (эмодзи)
        for (let fl of flowers) {
            const pos = worldToScreen(fl.x, fl.y);
            ctx.font = `${Math.max(16, 22 * camera.zoom)}px "Segoe UI Emoji"`;
            ctx.fillStyle = '#d45a3a';
            ctx.fillText("🌸", pos.x - 12, pos.y - 8);
        }
        
        document.getElementById('statsDisplay').innerHTML = `🌼 ${beds.length} клумб · ${flowers.length} цветов`;
    }
    
    // ---------- ОБРАБОТКА ВЗАИМОДЕЙСТВИЙ ----------
    function showMessage(html) {
        const toast = document.getElementById('toastMessage');
        toast.innerHTML = html;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 4500);
    }
    
    function handleCanvasClick(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;
        const world = screenToWorld(mouseX, mouseY);
        
        // клик по клумбе
        for (let bed of beds) {
            if (bed.type === 'circle') {
                if (Math.hypot(world.x - bed.x, world.y - bed.y) <= bed.radius + 0.7) {
                    const s = getBedStats(bed);
                    const formulaPart = bed.type === 'circle' 
                        ? `📐 круг: R = ${bed.radius.toFixed(1)} м<br>📏 C = 2·π·R = ${(2*Math.PI*bed.radius).toFixed(1)} м`
                        : `📐 прямоугольник: ${bed.width.toFixed(1)}×${bed.height.toFixed(1)} м<br>📏 P = 2·(a+b) = ${s.perimeter} м`;
                    showMessage(`<b>🌸 ${bed.mainFlower}</b><br>${formulaPart}<br>📍 S = ${s.area} м²<br>🌱 растений ≈ ${s.plants} шт (плотность ${s.density} шт/м²)`);
                    return;
                }
            } else {
                const halfW = bed.width/2, halfH = bed.height/2;
                if (Math.abs(world.x - bed.x) <= halfW + 0.6 && Math.abs(world.y - bed.y) <= halfH + 0.6) {
                    const s = getBedStats(bed);
                    showMessage(`<b>🌸 ${bed.mainFlower}</b><br>📐 прямоугольник: ${bed.width.toFixed(1)}×${bed.height.toFixed(1)} м<br>📏 P = ${s.perimeter} м<br>📍 S = ${s.area} м²<br>🌱 растений: ~${s.plants} шт`);
                    return;
                }
            }
        }
        // клик по цветку
        for (let fl of flowers) {
            if (Math.hypot(world.x - fl.x, world.y - fl.y) < 0.9) {
                const fact = FACTS[Math.floor(Math.random() * FACTS.length)];
                showMessage(`<b>${fl.flowerType}</b><br>📖 ${fact}<br>🌿 шаг посадки ~30 см`);
                return;
            }
        }
    }
    
    function initCameraAndEvents() {
        canvas = document.getElementById('mainCanvas');
        ctx = canvas.getContext('2d');
        container = document.getElementById('canvasContainer');
        
        const resize = () => {
            const rect = container.getBoundingClientRect();
            camera.width = rect.width;
            camera.height = rect.height;
            canvas.width = rect.width;
            canvas.height = rect.height;
            if (camera.zoom === 1.0) {
                const sx = camera.width / FIELD_W;
                const sy = camera.height / FIELD_H;
                camera.zoom = Math.min(sx, sy) * 0.85;
                camera.x = (FIELD_W / 2) - (camera.width / 2) / camera.zoom;
                camera.y = (FIELD_H / 2) - (camera.height / 2) / camera.zoom;
            }
            draw();
        };
        window.addEventListener('resize', resize);
        resize();
        
        // панорамирование
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStart.x = e.clientX;
            dragStart.y = e.clientY;
            canvas.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            camera.x -= dx / camera.zoom;
            camera.y -= dy / camera.zoom;
            dragStart.x = e.clientX;
            dragStart.y = e.clientY;
            draw();
        });
        window.addEventListener('mouseup', () => {
            isDragging = false;
            canvas.style.cursor = 'grab';
        });
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width/rect.width);
            const my = (e.clientY - rect.top) * (canvas.height/rect.height);
            const before = screenToWorld(mx, my);
            const delta = e.deltaY > 0 ? 0.92 : 1.08;
            camera.zoom = Math.min(4.5, Math.max(0.5, camera.zoom * delta));
            const after = screenToWorld(mx, my);
            camera.x += before.x - after.x;
            camera.y += before.y - after.y;
            draw();
        }, { passive: false });
        canvas.addEventListener('click', handleCanvasClick);
        canvas.style.cursor = 'grab';
    }
    
    function regenerateEverything() {
        paths = generatePaths();
        beds = generateBeds(paths, 140);
        let allFlowers = [];
        beds.forEach((bed, idx) => {
            const fls = generateFlowersOnBed(bed, idx);
            allFlowers.push(...fls);
        });
        flowers = allFlowers;
        draw();
    }
    
    window.onload = () => {
        initCameraAndEvents();
        regenerateEverything();
        document.getElementById('regenerateBtn').addEventListener('click', () => regenerateEverything());
    };
</script>
</body>
